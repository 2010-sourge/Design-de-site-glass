<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glassmorphism Site</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
 
  <!-- Blobs de fundo -->
  <div class="bg-blob bg-blob--1"></div>
  <div class="bg-blob bg-blob--2"></div>
  <div class="bg-blob bg-blob--3"></div>
 
  <!-- Card glassmorphism principal -->
  <div class="glass-card">
 
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="logo">LOGO<span>&gt;</span></div>
 
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Latest</a></li>
        <li><a href="#">Offers</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
 
      <div class="nav-actions">
        <a href="#" class="btn-auth btn-login">Login</a>
        <a href="#" class="btn-auth btn-register">Register</a>
      </div>
    </nav>
 
    <!-- HERO -->
    <section class="hero">
      <div class="hero-text">
        <h1 class="hero-title">
          Learn To Enjoy,<br />
          Every Moment Of Your Life
        </h1>
        <p class="hero-desc">
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Laborum
          facere in nam, officiis aspernatur consectetur aliquid sequi
          possimus et. Sint.
        </p>
      </div>
    </section>
 
    <!-- Play Video -->
    <div class="play-bar">
      <span class="play-line"></span>
      <span class="play-label">Play Video</span>
      <button class="play-btn" aria-label="Play Video">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>
    </div>
 
  </div><!-- /glass-card -->
 
</body>
</html>
